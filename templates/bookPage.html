{% extends "base.html" %}

{% block content %}
<h2 class="title" style="text-align: center;">
    {{ page.title }}
</h2>

<button type="button" class="collapsible" style="font-family: 'AmiriQuran';">
    نبذة الكتاب <b>+</b>
</button>
<div class="content">

            <button style="user-select: none; cursor: default;">
                <svg class="svgicon" viewBox="-3.6 -3.6 25.20 25.20"></svg>
            </button>
        </div>
        <iframe style="width: 100%; height: 100%;" id="bookFrame" lang="ar" src="{{ page.extra.link }}"></iframe>
    </div>
</div>

<script src="/js/books.js"></script>
<script>
    var coll = document.getElementsByClassName("collapsible");
    var i;

    for (i = 0; i < coll.length; i++)
    {
        coll[i].addEventListener("click", function ()
        {
            this.classList.toggle("active");
            var content = this.nextElementSibling;
            if (content.style.display === "block")
            {
                content.style.display = "none";
            } else
            {
                content.style.display = "block";
            }
        });
    }
</script>


{% endblock content %}
